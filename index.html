<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nubank - Réplica Fiel</title>
    <!-- Importando a fonte Inter para um visual moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link para o arquivo de estilos -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f7/Nubank_logo_2021.svg" alt="Nubank" class="logo">
            <nav class="nav-menu">
                <a href="#">Nubank <span>▾</span></a>
                <a href="#">Nubank Ultravioleta <span>▾</span></a>
                <a href="#">Nu Empresas <span>▾</span></a>
                <a href="#">Segurança <span>▾</span></a>
                <a href="#">Saiba Mais <span>▾</span></a>
            </nav>
        </div>
        <div class="header-right">
            <span class="search-icon">🔍</span>
            <button class="btn-login-secundario">Login Empresas</button>
            <button class="btn-nu-principal">Quero ser Nubank</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-container">
            <h1 class="hero-title">Seja qual for o seu problema, o Nubank tem uma solução</h1>
            
            <div class="signup-card">
                <h2>Peça seu Cartão de Crédito e sua Conta do Nubank</h2>
                <div class="input-field">
                    <input type="text" placeholder="Digite seu CPF">
                </div>
                <button class="btn-submit">
                    Continuar <span>→</span>
                </button>
            </div>
        </div>
    </section>

</body>
</html>
